<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NEXUS OS</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="styles/main.css" />
</head>

<body class="min-h-screen">

  <div class="flex flex-col md:flex-row min-h-screen">

    <!-- Sidebar -->
    <aside class="w-full md:w-64 glass border-r border-white/10 p-4">

      <div class="mb-8">
        <h1 class="text-2xl font-bold text-cyan-400">
          NEXUS OS
        </h1>

        <p class="text-sm text-slate-400 mt-1">
          AI Operator Infrastructure
        </p>
      </div>

      <nav class="space-y-2">

        <button class="sidebar-btn w-full text-left p-3 rounded-xl">
          📊 Overview
        </button>

        <button class="sidebar-btn w-full text-left p-3 rounded-xl">
          🎯 Leads
        </button>

        <button class="sidebar-btn w-full text-left p-3 rounded-xl">
          ⚡ AI Actions
        </button>

        <button class="sidebar-btn w-full text-left p-3 rounded-xl">
          ✅ Tasks
        </button>

        <button class="sidebar-btn w-full text-left p-3 rounded-xl">
          🧠 Vault
        </button>

      </nav>

    </aside>

    <!-- Main -->
    <main class="flex-1 p-5">

      <!-- Topbar -->
      <div class="glass rounded-2xl p-4 flex items-center justify-between mb-6">

        <div>
          <h2 class="text-xl font-semibold">
            Operator Dashboard
          </h2>

          <p class="text-sm text-slate-400">
            Control • Automate • Operate
          </p>
        </div>

        <div class="text-cyan-400 text-sm">
          SYSTEM ONLINE
        </div>

      </div>

      <!-- Quick Actions -->
      <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">

        <div class="glass rounded-2xl p-4">
          <p class="text-sm text-slate-400">Quick Action</p>
          <h3 class="text-lg font-bold mt-2">
            Generate Proposal
          </h3>
        </div>

        <div class="glass rounded-2xl p-4">
          <p class="text-sm text-slate-400">Quick Action</p>
          <h3 class="text-lg font-bold mt-2">
            Add Lead
          </h3>
        </div>

        <div class="glass rounded-2xl p-4">
          <p class="text-sm text-slate-400">Quick Action</p>
          <h3 class="text-lg font-bold mt-2">
            New Task
          </h3>
        </div>

        <div class="glass rounded-2xl p-4">
          <p class="text-sm text-slate-400">Quick Action</p>
          <h3 class="text-lg font-bold mt-2">
            AI Reply
          </h3>
        </div>

      </section>

      <!-- Workspace -->
      <section class="glass rounded-2xl p-6">

        <h3 class="text-xl font-semibold mb-3">
          Welcome to NEXUS OS 🚀
        </h3>

        <p class="text-slate-400 leading-relaxed">
          Your AI Operator Infrastructure System is now initialized.
        </p>

      </section>

    </main>

  </div>

  <!-- JS -->
  <script src="scripts/app.js"></script>

</body>

</html>
